<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0"
/>

<title>赵可睿生日快乐</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 星空 -->

<canvas id="stars"></canvas>

<!-- 烟花 -->

<canvas id="fireworks"></canvas>

<!-- 爱心 -->

<div id="hearts"></div>

<!-- 彩带 -->

<div id="confetti"></div>

<!-- =====================
     开场封面
===================== -->

<section id="cover">

    <div class="coverCard">

        <h3>To</h3>

        <h1>赵可睿</h1>

        <p>点击开启生日惊喜 ✨</p>

        <button id="startBtn">
            开启
        </button>

    </div>

</section>

<!-- =====================
     主场景
===================== -->

<section id="stage">

    <div id="scene">

        <div id="world">

            <!-- 第一层盒子 -->

            <div
            class="cube cube1"
            id="box1"
            >

                <div class="face front"></div>
                <div class="face back"></div>

                <div class="face right"></div>
                <div class="face left"></div>

                <div class="face top"></div>
                <div class="face bottom"></div>

            </div>

            <!-- 第二层盒子 -->

            <div
            class="cube cube2 hidden"
            id="box2"
            >

                <div class="face front"></div>
                <div class="face back"></div>

                <div class="face right"></div>
                <div class="face left"></div>

                <div class="face top"></div>
                <div class="face bottom"></div>

            </div>

            <!-- 第三层盒子 -->

            <div
            class="cube cube3 hidden"
            id="box3"
            >

                <div class="face front"></div>
                <div class="face back"></div>

                <div class="face right"></div>
                <div class="face left"></div>

                <div class="face top"></div>
                <div class="face bottom"></div>

            </div>

            <!-- =====================
                 书本
            ===================== -->

            <div
            id="bookContainer"
            class="hidden"
            >

                <div id="book">

                    <!-- 左页 -->

                    <div class="page leftPage"></div>

                    <!-- 右页 -->

                    <div class="page rightPage"></div>

                    <!-- 封面 -->

                    <div id="bookCover">

                        <div class="bookTitle">

                            给赵可睿

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- =====================
     信件
===================== -->

<section id="letterSection">

    <div id="letterCard">

        <h2>

            给赵可睿

        </h2>

        <div id="typingText"></div>

    </div>

</section>

<!-- 音乐 -->

<audio
id="bgm"
loop
preload="auto"
>

    <source
    src="assets/music.mp3"
    type="audio/mpeg"
    >

</audio>

<script src="script.js"></script>

</body>
</html>
