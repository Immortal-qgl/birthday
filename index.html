 <!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>赵可睿生日快乐</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 星空背景 -->

<canvas id="stars"></canvas>

<!-- 烟花 -->

<canvas id="fireworks"></canvas>

<!-- 爱心粒子 -->

<div id="hearts"></div>

<!-- 彩带 -->

<div id="confetti"></div>

<!-- =========================
     开场页
========================= -->

<section id="cover">

    <div class="coverCard">

        <h3>To</h3>

        <h1>赵可睿</h1>

        <p>

            点击开启生日惊喜 ✨

        </p>

        <button id="startBtn">

            开启

        </button>

    </div>

</section>

<!-- =========================
     主场景
========================= -->

<section id="stage">

    <div id="scene">

        <div id="world">

            <!-- =====================================
                 第一层礼盒
            ====================================== -->

            <div
            class="gift-box size1"
            id="box1"
            >

                <div class="lid"></div>

                <div class="panel front"></div>
                <div class="panel back"></div>

                <div class="panel left"></div>
                <div class="panel right"></div>

                <div class="bottom"></div>

                <!-- =========================
                     第二层礼盒
                ========================= -->

                <div
                class="gift-box size2 hidden"
                id="box2"
                >

                    <div class="lid"></div>

                    <div class="panel front"></div>
                    <div class="panel back"></div>

                    <div class="panel left"></div>
                    <div class="panel right"></div>

                    <div class="bottom"></div>

                    <!-- =========================
                         第三层礼盒
                    ========================= -->

                    <div
                    class="gift-box size3 hidden"
                    id="box3"
                    >

                        <div class="lid"></div>

                        <div class="panel front"></div>
                        <div class="panel back"></div>

                        <div class="panel left"></div>
                        <div class="panel right"></div>

                        <div class="bottom"></div>

                        <!-- =========================
                             书本
                        ========================= -->

                        <div
                        id="bookContainer"
                        class="hidden"
                        >

                            <div id="book">

                                <!-- 封底 -->

                                <div class="bookBack"></div>

                                <!-- 页面 -->

                                <div class="bookPages"></div>

                                <!-- 封面 -->

                                <div id="bookCover">

                                    <div class="bookTitle">

                                        给赵可睿

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- =========================
     信件
========================= -->

<section id="letterSection">

    <div id="letterCard">

        <h2>

            给赵可睿

        </h2>

        <div id="typingText"></div>

    </div>

</section>

<!-- =========================
     音乐
========================= -->

<audio
id="bgm"
loop
preload="auto"
>

    <source
    src="assets/music.mp3"
    type="audio/mpeg"
    >

</audio>

<script src="script.js"></script>

</body>
</html>
